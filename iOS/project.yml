name: Groundwork
options:
  bundleIdPrefix: com.shimondeitel.groundinglog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Groundwork:
    type: application
    platform: iOS
    sources:
      - path: Groundwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.groundinglog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Groundwork/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GroundworkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GroundworkTests
      - path: Groundwork.storekit
    dependencies:
      - target: Groundwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.groundinglog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GroundworkUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GroundworkUITests
    dependencies:
      - target: Groundwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.groundinglog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Groundwork:
    build:
      targets:
        Groundwork: all
        GroundworkTests: [test]
        GroundworkUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Groundwork.storekit
    test:
      config: Debug
      storeKitConfiguration: Groundwork.storekit
      targets:
        - GroundworkTests
        - GroundworkUITests
    archive:
      config: Release
